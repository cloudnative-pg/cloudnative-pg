---
apiVersion: v1
stringData:
  password: super
  username: postgres
kind: Secret
metadata:
  labels:
    cnpg.io/reload: "true"
  name: pg-superuser
  namespace: default
type: kubernetes.io/basic-auth
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: cluster-example
  namespace: default
spec:
  instances: 1
  superuserSecret:
    name: pg-superuser
  enableSuperuserAccess: true
  bootstrap:
    initdb:
      database: standard
      owner: standarduser
  storage:
    size: 1Gi
