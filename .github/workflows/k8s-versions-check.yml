# Retrieves a list of supported image versions for the cloud providers and
# creates a PR to update each relative JSON file:
# - Kind (Kubernetes in Docker): kind_versions.json
# - K3D (K3s in Docker): k3d_versions.json
# - GKE (Google Kubernetes Engine): gke_versions.json
# - AKS (Azure Kubernetes Service): aks_versions.json
# - EKS (Amazon Elastic Kubernetes Service): eks_versions.json
# - OCP (OpenShift): openshift_versions.json

name: k8s-versions-check
on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: 'Limit to the specified engines list (eks, aks, gke, kind, k3d, ocp)'
        required: false

permissions: read-all

defaults:
  run:
    shell: 'bash -Eeuo pipefail -x {0}'

env:
  # The minimal k8s version supported, k8s version smaller than this one will be removed from vendor
  MINIMAL_K8S: "1.31"
  MINIMAL_OCP: "4.18"

jobs:

  check-public-clouds-k8s-versions:
    runs-on: ubuntu-24.04
    env:
      EOL_FILTER: '
        def ver: split(".") | map(tonumber);
        [ .[]
          | select((.eol | type == "string") and (.eol > (now | strftime("%Y-%m-%d"))))
          | .cycle
        ]
        | map(select(ver >= ($min | ver)))    # >= MINIMAL_K8S
        | unique | sort_by(ver) | reverse'
    steps:
      -
        name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      -
        name: Get updated EKS versions
        run: |
          curl -fsSL https://endoflife.date/api/amazon-eks.json | \
            jq --arg min "$MINIMAL_K8S" "$EOL_FILTER" | \
            tee .github/eks_versions.json
        if: github.event.inputs.limit == null || github.event.inputs.limit == 'eks'
      -
        name: Get updated GKE versions
        run: |
          curl -fsSL https://endoflife.date/api/google-kubernetes-engine.json | \
            jq --arg min "$MINIMAL_K8S" "$EOL_FILTER" | \
            tee .github/gke_versions.json
        if: github.event.inputs.limit == null || github.event.inputs.limit == 'gke'
      -
        name: Get updated AKS versions
        run: |
          curl -fsSL https://releases.aks.azure.com/parsed_data.json | \
            jq --arg min "$MINIMAL_K8S" --arg region "West Europe" '
              def ver: split("(")[0] | split(".") | map(tonumber);    # "1.33.12" -> [1,33,12]
              [ .Sections.KubernetesSupportedVersions.Components[].ByRegion[]
                | select(.Regions | index($region))    # the bucket that contains West Europe
                | .KubernetesVersionList[]
                | select(.IsPreview == false and .IsLTS == false)    # GA, standard tier only
                | .VersionName | split("(")[0]
              ]
              | unique
              | map(select((ver)[0:2] >= ($min | split(".") | map(tonumber))))
              | group_by(ver[0:2])      # one bucket per minor
              | map(max_by(ver))        # latest patch per minor
              | sort_by(ver) | reverse
            ' | tee .github/aks_versions.json
        if: github.event.inputs.limit == null || github.event.inputs.limit == 'aks'
      -
        name: Get updated kind node version
        run : |
          # Get the latest valid kind node version, convert them to json
          # and write them to a file, starting from the MINIMAL_K8S
          for baseversion in $(seq $MINIMAL_K8S 0.01 99); do
            URL="https://registry.hub.docker.com/v2/repositories/kindest/node/tags?name=${baseversion}&ordering=last_updated"
            v=$(curl -SsL "${URL}" | jq -rc '.results[].name' | grep -v "alpha" | sort -Vr | head -n1) || RC=$?
            if [[ -z "${v}" ]]; then
               break
            fi
            echo "${v}"
          done | jq -Rs 'split("\n") | map(select(length>0)) | sort | reverse' | tee .github/kind_versions.json
        if: github.event.inputs.limit == null || github.event.inputs.limit == 'kind'
      -
        name: Get updated k3d versions
        run: |
          # Get the latest valid k3d image versions from Docker Hub
          # k3d uses rancher/k3s images, extract Kubernetes version only
          for baseversion in $(seq $MINIMAL_K8S 0.01 99); do
            URL="https://registry.hub.docker.com/v2/repositories/rancher/k3s/tags?name=${baseversion}&ordering=last_updated"
            v=$(curl -SsL "${URL}" | jq -rc '.results[].name' | grep -E "^v[0-9]+\.[0-9]+\.[0-9]+-k3s[0-9]+$" | sort -Vr | head -n1 | sed 's/-k3s.*//' ) || RC=$?
            if [[ -z "${v}" ]]; then
               break
            fi
            echo "${v}"
          done | jq -Rs 'split("\n") | map(select(length>0)) | sort | reverse' | tee .github/k3d_versions.json
        if: github.event.inputs.limit == null || github.event.inputs.limit == 'k3d'
      -
        name: Get updated OpenShift versions
        run: |
          # Match 4.18-4.19, and 4.20+
          curl -s https://mirror.openshift.com/pub/openshift-v4/clients/ocp/ | \
          grep -Eo 'href.*"4\.(1[8-9]|[2-9][0-9])\.[0-9].*"' | \
          grep -v rc | \
          sed -E 's/href="//;s/\/"//;s/(4\.(1[8-9]|[2-9][0-9]))(\..*$)/\1/' | \
          sort -Vru | \
          awk -vv="$MINIMAL_OCP" '$0>=v {print $0}' | \
          jq -Rn '[inputs]' | tee .github/openshift_versions.json

          OCP_VERSIONS=`cat .github/openshift_versions.json | jq -r '"v"+.[-1]+"-v"+.[0]'`
          sed -i -e 's/\(OPENSHIFT_VERSIONS ?= \)\(.*\)/\1'${OCP_VERSIONS}'/g' Makefile
        if: github.event.inputs.limit == null || github.event.inputs.limit == 'ocp'
      -
        name: Diff
        run: |
          git status
          git diff
      -
        name: Create Pull Request if versions have been updated
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        if: github.ref == 'refs/heads/main'
        with:
          token: ${{ secrets.REPO_GHA_PAT }}
          title: "chore: Public Cloud K8S versions update"
          body: "Update the versions used to test the operator on public cloud providers"
          branch: "k8s-cloud-versions-update"
          author: "public-cloud-k8s-versions-check <public-cloud-k8s-versions-check@users.noreply.github.com>"
          committer: "public-cloud-k8s-versions-check <public-cloud-k8s-versions-check@users.noreply.github.com>"
          labels: "no-issue"
          add-paths: |
            .github/**
            Makefile
          commit-message: "chore: Updated public cloud k8s tested versions"
          signoff: true
