# Run the Snyk scanning on the project only when something
# is pushed into main

name: Snyk scanning
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: read-all

jobs:
  # Expose whether a Snyk token is configured so the security job can gate
  # on it. The secrets context is not available in a job-level 'if', so it
  # is checked here and surfaced as a job output.
  check-secret:
    name: Check for Snyk token
    runs-on: ubuntu-24.04
    outputs:
      has_token: ${{ steps.check.outputs.has_token }}
    steps:
      - id: check
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: echo "has_token=${{ env.SNYK_TOKEN != '' }}" >> "$GITHUB_OUTPUT"

  security:
    needs: check-secret
    if: ${{ needs.check-secret.outputs.has_token == 'true' }}
    name: Security scan
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Static Code Analysis
        uses: snyk/actions/golang@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: 'code test'
          args: --sarif-file-output=snyk-static.sarif

      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: snyk-static.sarif

      - name: Vulnerability scan
        uses: snyk/actions/golang@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --sarif-file-output=snyk-test.sarif

      - name: Upload result to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: snyk-test.sarif
